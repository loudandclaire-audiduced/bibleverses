<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Proclaim It</title>

  <style>
    :root{
      --pink:#ef6ea9;
      --blue:#0c738f;
      --green:#39bb90;
      --yellow:#f4dd7c;
      --bg:#f9fafb;
      --card:#ffffff;
      --text:#1a1a1a;
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(900px 500px at 20% 0%, rgba(239,110,169,.14), transparent 60%),
        radial-gradient(900px 500px at 90% 10%, rgba(57,187,144,.12), transparent 55%),
        var(--bg);
      color: var(--text);
    }

    .wrap{ max-width:420px; margin:0 auto; padding:18px; }

    .header{
      display:flex;
      align-items:center;
      gap:14px;
      margin:10px 0 18px;
    }

    .logoWrap{
      width:56px;
      height:56px;
      border-radius:16px;
      background:#ffffff;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex:0 0 auto;
    }

    .logoWrap img{
      width:100%;
      height:100%;
      object-fit:contain;
      padding:8px;
    }

    .logoLink{
      display:inline-flex;
      text-decoration:none;
      color:inherit;
      border-radius:16px;
    }

    .logoLink:focus-visible{
      outline:3px solid rgba(12,115,143,.35);
      outline-offset:3px;
    }

    h1{ margin:0; font-size:24px; line-height:1.2; }

    .sub{
      font-size:13px;
      font-weight:900;
      color:var(--blue);
      margin-top:4px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:20px;
      border:2px solid var(--yellow);
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .category{
      display:inline-block;
      font-size:12px;
      font-weight:900;
      color:#ffffff;
      background:var(--blue);
      padding:6px 10px;
      border-radius:999px;
      margin-bottom:10px;
    }

    .verseText{
      font-size:21px;
      line-height:1.35;
      margin:6px 0 10px;
    }

    .reference{
      font-size:14px;
      font-weight:900;
      color:var(--blue);
      margin-bottom:14px;
    }

    .kidLine{
      background:var(--green);
      color:#ffffff;
      padding:14px;
      border-radius:14px;
      font-size:15px;
      line-height:1.45;
      margin-bottom:16px;
    }

    button{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px;
      font-size:16px;
      font-weight:900;
      background:var(--pink);
      color:#ffffff;
      cursor:pointer;
    }

    button:active{ transform:scale(.98); }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <a class="logoLink" href="https://bit.ly/LoudandClaire" target="_blank" rel="noopener noreferrer" aria-label="Visit Loud & Claire">
        <div class="logoWrap">
          <img src="logo.png" alt="Loud & Claire logo" />
        </div>
      </a>

      <div>
        <h1>Proclaim It</h1>
        <div class="sub">Loud and Claire</div>
      </div>
    </div>

    <div class="card">
      <div id="category" class="category"></div>
      <div id="verse" class="verseText"></div>
      <div id="reference" class="reference"></div>
      <div id="kidLine" class="kidLine"></div>

      <button onclick="readAloud()">Read Aloud</button>
    </div>
  </div>
